kind = "web"
previewPath = "/"
title = "AgentRail"
version = "1.0.0"
id = "artifacts/agentrail"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19423

[services.development]
run = "pnpm --filter @workspace/agentrail run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agentrail", "run", "build" ]
publicDir = "artifacts/agentrail/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19423"
BASE_PATH = "/"
